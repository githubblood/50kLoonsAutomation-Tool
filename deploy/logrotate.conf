# /etc/logrotate.d/lead-automation
# Rotates logs written by run.sh and Python's RotatingFileHandler.
# The Python handler manages its own rotation; logrotate handles the
# run.sh tee log and any plain .log files.

/opt/lead-automation/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    # Use copytruncate so the running process keeps its file handle
    copytruncate
    su automation automation
}
